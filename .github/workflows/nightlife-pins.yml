name: NYCIF Pin Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: '17 10 * * *'

permissions:
  contents: write

jobs:
  build-pins:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build generated pin data
        run: node tools/pin-pipeline/run-all-builders.mjs

      - name: Commit generated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/*.json data/reports/*.json
          if git diff --cached --quiet; then
            echo "No generated data changes to commit."
          else
            git commit -m "Refresh NYCIF generated data"
            git push
          fi
