<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#05070b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="NYCIF Map">
  <title>NYC In Focus Event Map</title>

  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/icon-192.svg">
  <link rel="preconnect" href="https://raw.githubusercontent.com">
  <link rel="preconnect" href="https://{s}.tile.openstreetmap.org">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="./style.css?v=hotfix-053">
  <link rel="stylesheet" href="./fielddesk-v02.css?v=v06safe-01">
  <link rel="stylesheet" href="./weekstrip-v06-safe.css?v=073time">
  <link rel="stylesheet" href="./staged-map-mode-v01.css?v=01">
  <link rel="stylesheet" href="./public-map-v01.css?v=ui-final-04">
</head>
<body class="public-map-page">
  <main id="app" class="app">
    <section class="map-shell" aria-label="NYC In Focus public event map">
      <div id="map" class="map" role="application" aria-label="NYC event map"></div>

      <div class="brand-card" aria-label="NYC In Focus Event Map status">
        <div class="brand-mark">NYCIF</div>
        <div>
          <strong>Field</strong>
          <span id="brandCount">Loading NYC events…</span>
        </div>
      </div>

      <div id="dateChips" class="date-chips" aria-label="Date filters">
        <button type="button" data-date-mode="today" class="active">Today</button>
        <button type="button" data-date-mode="tomorrow">Tomorrow</button>
        <button type="button" data-date-mode="weekend">Weekend</button>
        <button type="button" data-date-mode="all">All</button>
      </div>

      <button id="layersBtn" class="pill layers-pill" type="button" aria-expanded="false" aria-controls="layersPanel">
        <span>☰</span><b>Filters</b>
      </button>

      <aside id="layersPanel" class="layers-panel" aria-label="Map filters" hidden>
        <p class="panel-label">Choose what to show</p>

        <button id="loadAllBtn" class="load-all" type="button">
          Show more events
        </button>

        <label class="check major"><input type="checkbox" id="majorOnly"> <span>⭐ Major events only</span></label>

        <hr>

        <label class="check"><input type="checkbox" data-cat="sports" checked> <span>🏟️ Sports</span></label>
        <label class="check"><input type="checkbox" data-cat="parade" checked> <span>📣 Parades / civic</span></label>
        <label class="check"><input type="checkbox" data-cat="market" checked> <span>🛍️ Street fairs / markets</span></label>
        <label class="check"><input type="checkbox" data-cat="arts" checked> <span>🎭 Arts / performance</span></label>
        <label class="check"><input type="checkbox" data-cat="parks"> <span>🌳 Parks / family</span></label>
        <label class="check"><input type="checkbox" data-cat="general"> <span>📍 General</span></label>

        <hr>

        <label class="check"><input type="checkbox" id="photoOnly"> <span>📸 Photo-friendly picks</span></label>
        <label class="check"><input type="checkbox" id="nypdOnly"> <span>🚨 Public safety / field intel</span></label>
      </aside>

      <button id="locateBtn" class="locate-btn" type="button" aria-label="Show my location" title="Show my location">
        🗽
      </button>

      <button id="nearMeBtn" class="near-me-btn" type="button" aria-label="Sort events near me" title="Near me">
        Near Me
      </button>

      <button id="deskBtn" class="desk-btn" type="button" aria-expanded="false" aria-controls="deskDrawer">
        Event List
      </button>

      <aside id="deskDrawer" class="desk-drawer" aria-label="Event list" hidden>
        <header class="desk-header">
          <div>
            <p>NYC In Focus</p>
            <h1>Event Map</h1>
          </div>
          <button id="closeDeskBtn" class="close-btn" type="button" aria-label="Close event list">×</button>
        </header>

        <label class="search">
          <span class="sr-only">Search events</span>
          <input id="searchInput" type="search" placeholder="Search title, location, borough, type" autocomplete="off">
        </label>

        <div class="boroughs" id="boroughs"></div>

        <label class="sort">
          <span>Sort</span>
          <select id="sortSelect">
            <option value="priority">Priority</option>
            <option value="near">Near me</option>
            <option value="time">Time</option>
            <option value="borough">Borough</option>
            <option value="type">Type</option>
          </select>
        </label>

        <div id="listMeta" class="list-meta">Loading events...</div>
        <div id="eventList" class="event-list"></div>
      </aside>

      <div class="public-intro-v01"><strong>NYC In Focus:</strong> a live field map of public events, civic activity, arts, markets, parks and sports across New York City. Event details can change; confirm before traveling.</div>
      <div id="status" class="status">Loading NYC In Focus event map…</div>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="./public-approved-overlays-capture-v01.js?v=01"></script>
  <script src="./boot-today-v073-safe.js?v=01"></script>
  <script src="./date-normalizer-v073-safe.js?v=01"></script>
  <script src="./calendar-links-v01.js?v=07"></script>
  <script src="./vip-filter-v01.js?v=01"></script>
  <script src="./live-alerts-v02.js?v=02"></script>
  <script src="./ui-polish-v01.js?v=03"></script>
  <script src="./event-location-corrections-v01.js?v=01"></script>
  <script src="./app-v06-safe.js?v=calendar-06" type="module"></script>
  <script src="./public-approved-overlays-v01.js?v=01"></script>
  <script src="./popup-autoclose-fix-v01.js?v=popup-v05-hide-x"></script>
  <script src="./public-map-autoload-v01.js?v=01"></script>
  <script src="./staged-review-autoload-v01.js?v=01"></script>
</body>
</html>
