<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#05070b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="NYCIF Desk">
  <title>NYCIF Field Desk</title>

  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/icon-192.svg">
  <link rel="preconnect" href="https://raw.githubusercontent.com">
  <link rel="preconnect" href="https://{s}.tile.openstreetmap.org">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="./style.css?v=hotfix-053">
  <link rel="stylesheet" href="./fielddesk-v02.css?v=v06safe-01">
  <link rel="stylesheet" href="./weekstrip-v06-safe.css?v=073time">
  <link rel="stylesheet" href="./data-window-v08-safe.css?v=01">
  <link rel="stylesheet" href="./truth-panel-v09-safe.css?v=01">
  <link rel="stylesheet" href="./live-test-v010-safe.css?v=011">
  <link rel="stylesheet" href="./test-feed-panel-v01.css?v=01">
  <link rel="stylesheet" href="./test-map-layer-v01.css?v=01">
  <link rel="stylesheet" href="./staged-map-mode-v01.css?v=01">
</head>
<body>
  <main id="app" class="app">
    <section class="map-shell" aria-label="NYC In Focus Field Desk">
      <div id="map" class="map" role="application" aria-label="NYC events assignment map"></div>

      <div class="brand-card" aria-label="NYC In Focus Field Desk status">
        <div class="brand-mark">NYCIF</div>
        <div>
          <strong>Field Desk</strong>
          <span id="brandCount">Loading live assignments…</span>
        </div>
      </div>

      <div id="dateChips" class="date-chips" aria-label="Date filters">
        <button type="button" data-date-mode="today" class="active">Today</button>
        <button type="button" data-date-mode="tomorrow">Tomorrow</button>
        <button type="button" data-date-mode="weekend">Weekend</button>
        <button type="button" data-date-mode="all">All</button>
      </div>

      <button id="layersBtn" class="pill layers-pill" type="button" aria-expanded="false" aria-controls="layersPanel">
        <span>☰</span><b>Layers</b>
      </button>

      <aside id="layersPanel" class="layers-panel" aria-label="Assignment filters" hidden>
        <p class="panel-label">Default: today + major assignments</p>

        <button id="loadAllBtn" class="load-all" type="button">
          Load all events
        </button>
        <button id="fullTodayBtn" class="load-all full-today-test" type="button">
          Full Today Test
        </button>
        <button id="fullDataBtn" class="load-all full-data-test" type="button">
          Full Data Test
        </button>

        <label class="check major"><input type="checkbox" id="majorOnly"> <span>⭐ Major/field picks only</span></label>

        <hr>

        <label class="check"><input type="checkbox" data-cat="sports" checked> <span>🏟️ World Cup / sports</span></label>
        <label class="check"><input type="checkbox" data-cat="parade" checked> <span>📣 Parades / civic / Pride</span></label>
        <label class="check"><input type="checkbox" data-cat="market" checked> <span>🛍️ Street fairs / pop-ups</span></label>
        <label class="check"><input type="checkbox" data-cat="arts" checked> <span>🎭 Arts / production</span></label>
        <label class="check"><input type="checkbox" data-cat="parks"> <span>🌳 Parks / family</span></label>
        <label class="check"><input type="checkbox" data-cat="general"> <span>📍 General</span></label>

        <hr>

        <label class="check"><input type="checkbox" id="photoOnly"> <span>📸 Photo picks only</span></label>
        <label class="check"><input type="checkbox" id="nypdOnly"> <span>🚨 NYPD intel only</span></label>
      </aside>

      <button id="locateBtn" class="locate-btn" type="button" aria-label="Show my location" title="Show my location">
        🗽
      </button>

      <button id="nearMeBtn" class="near-me-btn" type="button" aria-label="Sort assignments near me" title="Near me">
        Near Me
      </button>

      <button id="deskBtn" class="desk-btn" type="button" aria-expanded="false" aria-controls="deskDrawer">
        Assignment Desk
      </button>

      <aside id="deskDrawer" class="desk-drawer" aria-label="Assignment desk" hidden>
        <header class="desk-header">
          <div>
            <p>NYC In Focus</p>
            <h1>Field Desk</h1>
          </div>
          <button id="closeDeskBtn" class="close-btn" type="button" aria-label="Close assignment desk">×</button>
        </header>

        <label class="search">
          <span class="sr-only">Search assignments</span>
          <input id="searchInput" type="search" placeholder="Search title, location, borough, type" autocomplete="off">
        </label>

        <div class="boroughs" id="boroughs"></div>

        <label class="sort">
          <span>Sort</span>
          <select id="sortSelect">
            <option value="priority">Priority</option>
            <option value="near">Near me</option>
            <option value="time">Time</option>
            <option value="borough">Borough</option>
            <option value="type">Type</option>
          </select>
        </label>

        <div id="listMeta" class="list-meta">Loading assignments...</div>
        <div id="eventList" class="event-list"></div>
      </aside>

      <div id="status" class="status">Loading major field assignments…</div>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="./boot-today-v073-safe.js?v=01"></script>
  <script src="./date-normalizer-v073-safe.js?v=01"></script>
  <script src="./app-v06-safe.js?v=staged-live-02" type="module"></script>
  <script src="./popup-autoclose-fix-v01.js?v=popup-artifact-01"></script>
  <script src="./staged-status-clarity-v01.js?v=01"></script>
  <script src="./show-all-staged-v01.js?v=01"></script>
  <script src="./stats-v05-safe.js?v=01"></script>
  <script src="./data-window-v08-safe.js?v=01"></script>
  <script src="./truth-panel-v09-safe.js?v=01"></script>
  <script src="./live-test-v011-safe.js?v=01"></script>
  <script src="./test-feed-panel-v01.js?v=01"></script>
  <script src="./test-map-layer-v01.js?v=01"></script>
  <script src="./staged-feed-mode-v01.js?v=01"></script>
  <script src="./staged-marker-layer-v01.js?v=01"></script>
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      const fullToday = document.getElementById('fullTodayBtn');
      const fullData = document.getElementById('fullDataBtn');
      const status = document.getElementById('status');
      const enableAllCats = () => document.querySelectorAll('[data-cat]').forEach(input => { if (!input.checked) input.click(); });
      const clearNarrow = () => ['majorOnly','photoOnly','nypdOnly'].forEach(id => {
        const input = document.getElementById(id);
        if (input && input.checked) input.click();
      });
      const loadAll = () => document.getElementById('loadAllBtn')?.click();
      if (fullToday) {
        fullToday.addEventListener('click', () => {
          if (status) status.textContent = 'Full Today Test: loading full feed and enabling all categories...';
          document.querySelector('[data-date-mode="today"]')?.click();
          enableAllCats();
          clearNarrow();
          loadAll();
          setTimeout(() => {
            if (status) status.textContent += ' Full Today Test active. Map remains capped for phone safety.';
          }, 2200);
        });
      }
      if (fullData) {
        fullData.addEventListener('click', () => {
          if (status) status.textContent = 'Full Data Test: loading complete feed, all dates, all categories...';
          document.querySelector('[data-date-mode="all"]')?.click();
          enableAllCats();
          clearNarrow();
          loadAll();
          setTimeout(() => {
            if (status) status.textContent += ' Full Data Test active. Use Stats to see what is drawn and what is capped.';
          }, 2600);
        });
      }
    });
  </script>
</body>
</html>
